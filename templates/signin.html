{% extends "base.html" %}

{% block title %}
Theory Test App - Sign In
{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='styles/signin.css') }}">
{% endblock %}

{% block content %}
<div class="signin-page">
    <div class="signin-card">
        <div class="title-box">Sign In</div>

        <div class="role-row">
            <button type="button" id="student-btn" class="role-btn">Student</button>
            <button type="button" id="instructor-btn" class="role-btn">Instructor</button>
        </div>

        <form id="signin-form" action="/auth/authorise_user" method="post" class="signin-form">
            <input type="hidden" name="user_type" id="user_type" value="">

            <div class="field-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="field-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="field-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="bottom-row">
                <a href="/" class="signup-link">Don't have an account?<br>Sign Up</a>

                <div class="error-message">
                    {% if messages %}
                        {{ messages[0] }}
                    {% endif %}
                </div>

                <button id="submit-btn" type="submit" class="submit-btn" disabled>Submit</button>
            </div>
        </form>
    </div>
</div>

<script>
const signinForm = document.getElementById('signin-form');
const submitBtn = document.getElementById('submit-btn');
const studentBtn = document.getElementById('student-btn');
const instructorBtn = document.getElementById('instructor-btn');
const userTypeInput = document.getElementById('user_type');

studentBtn.addEventListener('click', function() {
    userTypeInput.value = 'student';
    submitBtn.disabled = false;
    studentBtn.classList.add('active');
    instructorBtn.classList.remove('active');
});

instructorBtn.addEventListener('click', function() {
    userTypeInput.value = 'instructor';
    submitBtn.disabled = false;
    instructorBtn.classList.add('active');
    studentBtn.classList.remove('active');
});

signinForm.addEventListener('submit', function(event) {
    if (!userTypeInput.value) {
        event.preventDefault();
        alert('Please choose student or instructor before signing in.');
    }
});
</script>
{% endblock %}
